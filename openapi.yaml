openapi: 3.0.3
info:
  title: Petstore API
  description: A comprehensive API for managing a pet store with users, pets, and orders
  version: 1.2.0
  contact:
    email: support@petstore.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: https://api.petstore.com/v1
    description: Production server
  - url: https://staging-api.petstore.com/v1
    description: Staging server
paths:
  /pets:
    get:
      summary: List all pets
      description: Retrieve a paginated list of all pets in the store
      operationId: listPets
      tags:
        - Pets
      parameters:
        - name: limit
          in: query
          description: Maximum number of pets to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          description: Number of pets to skip
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: status
          in: query
          description: Filter pets by status
          schema:
            type: string
            enum: [available, pending, sold]
      responses:
        '200':
          description: List of pets
        '400':
          description: Invalid parameters
    post:
      summary: Add a new pet
      description: Create a new pet in the store
      operationId: createPet
      tags:
        - Pets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - category
              properties:
                name:
                  type: string
                  example: "Fluffy"
                category:
                  type: string
                  example: "Cat"
                status:
                  type: string
                  enum: [available, pending, sold]
                  default: available
      responses:
        '201':
          description: Pet created successfully
        '400':
          description: Invalid input
        '422':
          description: Validation error
  /pets/{petId}:
    get:
      summary: Get pet by ID
      description: Retrieve detailed information about a specific pet
      operationId: getPetById
      tags:
        - Pets
      parameters:
        - name: petId
          in: path
          required: true
          description: ID of the pet to retrieve
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Pet details
        '404':
          description: Pet not found
        '400':
          description: Invalid ID supplied
    put:
      summary: Update an existing pet
      description: Update pet information by ID
      operationId: updatePet
      tags:
        - Pets
      parameters:
        - name: petId
          in: path
          required: true
          description: ID of the pet to update
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                category:
                  type: string
                status:
                  type: string
                  enum: [available, pending, sold]
      responses:
        '200':
          description: Pet updated successfully
        '400':
          description: Invalid ID or input
        '404':
          description: Pet not found
        '422':
          description: Validation error
    delete:
      summary: Delete a pet
      description: Remove a pet from the store
      operationId: deletePet
      tags:
        - Pets
      parameters:
        - name: petId
          in: path
          required: true
          description: ID of the pet to delete
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Pet deleted successfully
        '400':
          description: Invalid ID supplied
        '404':
          description: Pet not found
  /users:
    get:
      summary: List all users
      description: Retrieve a list of all registered users
      operationId: listUsers
      tags:
        - Users
      parameters:
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of users per page
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        '200':
          description: List of users
        '400':
          description: Invalid parameters
    post:
      summary: Create user
      description: Register a new user account
      operationId: createUser
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 20
                  example: "john_doe"
                email:
                  type: string
                  format: email
                  example: "john@example.com"
                password:
                  type: string
                  minLength: 8
                  example: "secretpassword"
                firstName:
                  type: string
                  example: "John"
                lastName:
                  type: string
                  example: "Doe"
      responses:
        '201':
          description: User created successfully
        '400':
          description: Invalid input
        '409':
          description: Username or email already exists
  /users/{userId}:
    get:
      summary: Get user by ID
      description: Retrieve user information by user ID
      operationId: getUserById
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          description: ID of the user to retrieve
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User information
        '404':
          description: User not found
        '400':
          description: Invalid user ID
    put:
      summary: Update user
      description: Update user information
      operationId: updateUser
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          description: ID of the user to update
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                firstName:
                  type: string
                lastName:
                  type: string
      responses:
        '200':
          description: User updated successfully
        '400':
          description: Invalid input
        '404':
          description: User not found
    delete:
      summary: Delete user
      description: Remove user account
      operationId: deleteUser
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          description: ID of the user to delete
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: User deleted successfully
        '404':
          description: User not found
  /orders:
    get:
      summary: List orders
      description: Retrieve a list of all orders
      operationId: listOrders
      tags:
        - Orders
      parameters:
        - name: status
          in: query
          description: Filter orders by status
          schema:
            type: string
            enum: [pending, approved, delivered, cancelled]
        - name: userId
          in: query
          description: Filter orders by user ID
          schema:
            type: integer
      responses:
        '200':
          description: List of orders
        '400':
          description: Invalid parameters
    post:
      summary: Place an order
      description: Create a new order for pets
      operationId: placeOrder
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - petId
                - quantity
                - userId
              properties:
                petId:
                  type: integer
                  format: int64
                  example: 123
                quantity:
                  type: integer
                  minimum: 1
                  example: 2
                userId:
                  type: integer
                  format: int64
                  example: 456
                shipDate:
                  type: string
                  format: date-time
                  example: "2024-12-25T10:00:00Z"
      responses:
        '201':
          description: Order placed successfully
        '400':
          description: Invalid input
        '404':
          description: Pet or user not found
  /orders/{orderId}:
    get:
      summary: Get order by ID
      description: Retrieve order details by order ID
      operationId: getOrderById
      tags:
        - Orders
      parameters:
        - name: orderId
          in: path
          required: true
          description: ID of the order to retrieve
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order details
        '404':
          description: Order not found
        '400':
          description: Invalid order ID
    put:
      summary: Update order
      description: Update order status or details
      operationId: updateOrder
      tags:
        - Orders
      parameters:
        - name: orderId
          in: path
          required: true
          description: ID of the order to update
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pending, approved, delivered, cancelled]
                shipDate:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Order updated successfully
        '400':
          description: Invalid input
        '404':
          description: Order not found
    delete:
      summary: Cancel order
      description: Cancel an existing order
      operationId: cancelOrder
      tags:
        - Orders
      parameters:
        - name: orderId
          in: path
          required: true
          description: ID of the order to cancel
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Order cancelled successfully
        '404':
          description: Order not found
        '400':
          description: Order cannot be cancelled
  /auth/login:
    post:
      summary: User login
      description: Authenticate user and return access token
      operationId: loginUser
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: "john_doe"
                password:
                  type: string
                  example: "secretpassword"
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials
        '400':
          description: Invalid input
  /auth/logout:
    post:
      summary: User logout
      description: Invalidate user session and access token
      operationId: logoutUser
      tags:
        - Authentication
      responses:
        '200':
          description: Logout successful
        '401':
          description: User not authenticated
  /auth/refresh:
    post:
      summary: Refresh access token
      description: Get a new access token using refresh token
      operationId: refreshToken
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      responses:
        '200':
          description: Token refreshed successfully
        '401':
          description: Invalid refresh token
        '400':
          description: Invalid input